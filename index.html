<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenBath Pro - Fan Edition</title>
    <style>
         * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0f0c29; /* Fallback for white background issue */
        }
        body {
            overflow: hidden;
            /* Lo-Fi Midnight Twilight Background */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas { display: block; touch-action: none; }

        #meter-vessel {
            width: 100%; height: 12px; background: rgba(0, 0, 0, 0.4);
            position: absolute; top: 0; left: 0; z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #timer-bar-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #4ecca3, #bbffaa, #4ecca3);
            background-size: 200% auto; animation: flow 3s linear infinite;
            transition: width 0.2s linear;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }
        #timer-bar-fill.warning {
            background: linear-gradient(90deg, #f09819, #edde5d, #f09819);
            box-shadow: 0 0 10px rgba(240, 152, 25, 0.5);
        }
        #timer-bar-fill.critical {
            background: linear-gradient(90deg, #cb2d3e, #ef473a, #cb2d3e);
            animation: flow 0.8s linear infinite;
            box-shadow: 0 0 15px rgba(239, 71, 58, 0.7);
        }
        .vibrate {
            animation: vibrate-anim 0.1s infinite;
        }
        @keyframes vibrate-anim {
            0% { transform: translate(0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0); }
        }

        #ui-top {
            position: absolute; top: 12px; left: 0; right: 0;
            display: flex; justify-content: center; pointer-events: none; z-index: 5;
        }
        .stats-row {
            width: 92%; max-width: 500px; display: flex; justify-content: space-between; align-items: center;
        }

        .mini-stat {
            color: #ffffff; font-weight: bold; font-size: 13px;
            background: rgba(0, 0, 0, 0.4); padding: 5px 12px;
            border-radius: 10px; backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; gap: 6px;
        }
        .stat-label { font-size: 9px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.5px; }

        #multiplier-display {
            font-size: 34px; font-weight: 900; color: #ffffff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-streak { color: #fff !important; text-shadow: 0 0 25px #00f2ff, 0 0 10px #00f2ff !important; transform: scale(1.25); }

        #level-tag {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.5); color: white;
            padding: 4px 10px; border-radius: 8px; font-size: 10px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            font-weight: bold; letter-spacing: 1px;
        }

        @keyframes flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        #level-up-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 50px; font-weight: 900; opacity: 0;
            pointer-events: none; transition: opacity 0.4s;
            text-shadow: 0 0 30px rgba(253, 187, 45, 0.8);
        }
        @keyframes screen-shake-anim {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, -3px); }
            100% { transform: translate(0, 0); }
        }
        .screen-shake {
            animation: screen-shake-anim 0.15s ease-out;
        }

        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }
        .flash-hit {
            animation: flash-anim 0.2s ease-out;
        }

        .game-explode {
            animation: explode-fade 1.2s ease-out forwards;
        }
        @keyframes explode-fade {
            0% { filter: brightness(1) invert(0); transform: scale(1); }
            15% { filter: brightness(20) invert(1); transform: scale(1.05); }
            100% { filter: brightness(0) invert(0); transform: scale(1.2); opacity: 0; }
        }

        #overlay, #game-over {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100; backdrop-filter: blur(10px);
        }
        #game-over { display: none; }

        /* Store / Codex Styles */
        #store-screen {
            position: absolute; inset: 0; background: rgba(10, 10, 30, 0.95);
            display: none; flex-direction: column; align-items: center;
            color: white; z-index: 110; backdrop-filter: blur(15px);
            padding: 40px 20px; overflow-y: auto;
        }
        .store-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px; width: 100%; max-width: 600px; margin-top: 30px;
        }
        .bubble-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px; text-align: center;
            transition: transform 0.3s;
        }
        .bubble-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); }
        .bubble-card canvas { margin: 0 auto 10px; pointer-events: none; }
        .bubble-card h3 { margin: 5px 0; font-size: 16px; color: #4ecca3; }
        .bubble-card p { font-size: 11px; opacity: 0.7; line-height: 1.4; margin: 0; }

        .back-btn {
            position: sticky; bottom: 20px; margin-top: 40px;
            background: #4ecca3; color: #1a1a2e;
        }

        .toggle-container {
            display: flex; gap: 20px; margin: 20px 0;
            justify-content: center; width: 100%;
        }
        .toggle-btn {
            background: rgba(255, 255, 255, 0.05); border: 2px solid #4ecca3;
            color: #4ecca3; width: 60px; height: 60px; border-radius: 50%;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: none; margin-top: 0;
            box-shadow: 0 0 15px rgba(78, 204, 163, 0.2);
        }
        .toggle-btn.off {
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.2);
            filter: grayscale(1);
        }
        .toggle-btn:not(.off) {
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.4);
            transform: scale(1.1);
        }

        button {
            margin-top: 25px; padding: 15px 50px; border: none; border-radius: 50px;
            background: #ffffff; color: #b21f1f; font-weight: 900; cursor: pointer;
            font-size: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="letter-spacing: 5px;">ZENBATH LO-FI</h1>
        <p>Vibe with the bubbles. Fan at LVL 5. Hunter at LVL 2.</p>
        <div style="display: flex; gap: 15px;">
            <button onclick="startGame()">START VIBING</button>
            <button onclick="toggleStore(true)" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid white;">STORE</button>
        </div>
    </div>

    <div id="store-screen">
        <h1 style="letter-spacing: 3px;">ZEN CODEX</h1>
        <p style="font-size: 12px; opacity: 0.6; margin-top: -10px;">Customize your experience</p>
        <div class="toggle-container">
            <button id="lizard-toggle-btn" class="toggle-btn" title="Hunter Lizard" onclick="toggleLizardSetting()">🦎</button>
            <button id="fan-toggle-btn" class="toggle-btn" title="Table Fan" onclick="toggleFanSetting()">🌬️</button>
            <button id="zen-toggle-btn" class="toggle-btn" title="Zen Mode" onclick="toggleZenMode()">🧘</button>
        </div>
        <div class="store-grid" id="store-grid"></div>
        <button class="back-btn" onclick="toggleStore(false)">GO BACK</button>
    </div>

    <div id="meter-vessel"><div id="timer-bar-fill"></div></div>

    <div id="ui-top">
        <div class="stats-row">
            <div class="mini-stat">
                <span class="stat-label">Best</span>
                <span id="best-val">0</span>
            </div>

            <div id="multiplier-display">1x</div>

            <div class="mini-stat">
                <span class="stat-label">Score</span>
                <span id="pop-count">0</span>
            </div>
        </div>
    </div>

    <div id="level-tag">Level <span id="level-val">1</span></div>
    <div id="level-up-msg">Level Up!!</div>

    <div id="game-over">
        <h1 style="letter-spacing: 5px;">GAME OVER</h1>
        <p>Final Score: <span id="final-score" style="font-size: 24px; color: #fdbb2d;">0</span></p>
        <p id="new-record-msg" style="color: #4ecca3; display: none; font-weight: bold;">NEW RECORD!</p>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const popDisplay = document.getElementById('pop-count');
        const bestDisplay = document.getElementById('best-val');
        const levelDisplay = document.getElementById('level-val');
        const multDisplay = document.getElementById('multiplier-display');
        const timerFill = document.getElementById('timer-bar-fill');
        const meterVessel = document.getElementById('meter-vessel');
        const gameOverScreen = document.getElementById('game-over');
        const overlay = document.getElementById('overlay');

        // --- GLOBAL STATE ---
        let cw, ch, lastHeartbeat = 0;
        let bubbles = [], particles = [], scoreTexts = [], windTrails = [], comboCount = 0, lastPopTime = 0, isMouseDown = false;
        let timeFreezeTimer = 0, magnetTimer = 0, surgeTimer = 0, lastX = 0, lastY = 0;
        let storeBubbles = [], storeActive = false, storeReqId = null;
        let totalScore = 0, currentLevel = 1, speedMultiplier = 1, voidX = 0, voidY = 0, blackHoleActive = false;
        let streakMultiplier = 1, zenMeter = 100, gameActive = false, drainRate = 0.06;
        let fanEnabled = localStorage.getItem('zenFanEnabled') !== 'false';
        let lizardEnabled = localStorage.getItem('zenLizardEnabled') !== 'false';
        let zenModeEnabled = localStorage.getItem('zenModeEnabled') === 'true';
        let zenModePurchased = localStorage.getItem('zenModePurchased') === 'true';

        let bestScore = localStorage.getItem('zenBathBestScore') || 0;
        bestDisplay.innerText = Number(bestScore).toLocaleString();

        // --- HAPTICS / VIBRATION BRIDGE ---
        function triggerVibration(pattern = 50) {
            // 1. Try Native Android Bridge first (if implemented in Java)
            if (window.AndroidInterface && window.AndroidInterface.vibrate) {
                window.AndroidInterface.vibrate(Array.isArray(pattern) ? pattern[0] : pattern);
            }
            // 2. Fallback to Web Vibration API
            else if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        function updateCanvasSize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }

        // Reorganized Init: Call this AFTER variables are declared
        function initApp() {
            updateCanvasSize();

            // Check status on load if bridge exists
            if (window.AndroidInterface && window.AndroidInterface.checkIsPurchased) {
                if (window.AndroidInterface.checkIsPurchased("zen_mode_permanent")) {
                    zenModePurchased = true;
                    localStorage.setItem('zenModePurchased', 'true');
                }
            }
            updateToggleUI();
        }

        window.onload = () => {
            initApp();
            setTimeout(updateCanvasSize, 100); // Layout safety for WebViews
        };

        const bubbleSpecs = {
            'normal': { name: 'Zen Bubble', desc: 'The essence of lofi. Simple points.', color: '#a1c4fd' },
            'gold': { name: 'Gold Bubble', desc: 'High value. Boosts score and streak.', color: '#FFD700' },
            'diamond': { name: 'Diamond Bubble', desc: 'Eternal clarity. Massive score & time refill.', color: '#ffffff' },
            'freeze': { name: 'Time Freeze', desc: 'Chills the vibe. Pauses time drain.', color: '#00ffff' },
            'magnet': { name: 'Zen Magnet', desc: 'Attracts positivity. Pulls good bubbles to you.', color: '#ff00ff' },
            'surge': { name: 'Multiplier Surge', desc: 'Electric energy. Locks multiplier at 10x.', color: '#9d00ff' },
            'split': { name: 'Splitter', desc: 'Chaotic harmony. Bursts into mini-bubbles.', color: '#ff5722' },
            'trash': { name: 'Gunk', desc: 'The bad vibes. Loses points and time.', color: '#3e2723' },
            'void': { name: 'Void Bubble', desc: 'Instability. Popping this ends the vibe immediately.', color: '#ff1111' }
        };

        const bubbleColors = ['#a1c4fd', '#c2e9fb', '#d4fc79', '#96e6a1', '#84fab0', '#e0c3fc'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleStore(show) {
            const screen = document.getElementById('store-screen');
            storeActive = show;
            screen.style.display = show ? 'flex' : 'none';
            if (show) {
                populateStore();
                updateToggleUI();
                storeAnimate();
            } else {
                cancelAnimationFrame(storeReqId);
            }
        }

        function toggleFanSetting() {
            fanEnabled = !fanEnabled;
            localStorage.setItem('zenFanEnabled', fanEnabled);
            updateToggleUI();
        }
        function toggleLizardSetting() {
            lizardEnabled = !lizardEnabled;
            localStorage.setItem('zenLizardEnabled', lizardEnabled);
            updateToggleUI();
        }

        function toggleZenMode() {
            if (!zenModePurchased) {
                // Trigger Android In-App Purchase Flow
                initiateZenModePurchase();
                return;
            }
            zenModeEnabled = !zenModeEnabled;
            localStorage.setItem('zenModeEnabled', zenModeEnabled);
            updateToggleUI();
        }

        function initiateZenModePurchase() {
            if (window.AndroidInterface) {
                // Call the native Android method
                window.AndroidInterface.launchBillingFlow("zen_mode_permanent");
            } else {
                alert("In-App Purchases are only available in the Android App.");
            }
        }

        // Global callback for Android to call after a successful purchase
        window.onPurchaseSuccess = function(productId) {
            if (productId === "zen_mode_permanent") {
                zenModePurchased = true;
                localStorage.setItem('zenModePurchased', 'true');
                updateToggleUI();
                alert("Enlightenment Achieved! Zen Mode Unlocked.");
            }
        }

        function updateToggleUI() {
            const fb = document.getElementById('fan-toggle-btn');
            const lb = document.getElementById('lizard-toggle-btn');
            const zb = document.getElementById('zen-toggle-btn');
            if (fb) {
                fb.className = 'toggle-btn' + (fanEnabled ? '' : ' off');
            }
            if (lb) {
                lb.className = 'toggle-btn' + (lizardEnabled ? '' : ' off');
            }
            if (zb) {
                zb.className = 'toggle-btn' + (zenModeEnabled ? '' : ' off');
                zb.innerHTML = zenModePurchased ? '🧘' : '🔒';
            }
        }

        function populateStore() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = '';
            storeBubbles = [];

            Object.keys(bubbleSpecs).forEach(key => {
                const spec = bubbleSpecs[key];
                const card = document.createElement('div');
                card.className = 'bubble-card';

                const sCanvas = document.createElement('canvas');
                sCanvas.width = 100;
                sCanvas.height = 100;
                const sCtx = sCanvas.getContext('2d');

                // Create a static preview bubble
                const b = new Bubble(50, 50);
                b.rarity = key;
                b.color = spec.color;
                b.x = 50; b.y = 50;
                b.speed = 0; // Prevent rising
                b.isStatic = true;

                // Match visual properties from reset() logic
                if (key === 'freeze' || key === 'magnet') b.orbiters = 1;
                else if (key === 'surge' || key === 'diamond' || key === 'split') b.orbiters = 2;
                else if (key === 'gold') b.orbiters = 3;
                else if (key === 'void') b.orbiters = 4;
                if (key === 'split') b.radius = 35;
                if (key === 'trash') b.radius = 30;

                storeBubbles.push({ b, ctx: sCtx, canvas: sCanvas });

                card.appendChild(sCanvas);
                card.insertAdjacentHTML('beforeend', `<h3>${spec.name}</h3><p>${spec.desc}</p>`);
                grid.appendChild(card);
            });
        }

        function storeAnimate() {
            if (!storeActive) return;
            storeBubbles.forEach(sb => {
                sb.ctx.clearRect(0, 0, sb.canvas.width, sb.canvas.height);
                sb.b.update();
                sb.b.draw(sb.ctx);
            });
            storeReqId = requestAnimationFrame(storeAnimate);
        }

        function playPopSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'special') {
                osc.frequency.setValueAtTime(783.99, now);
                osc.frequency.exponentialRampToValueAtTime(1174.66, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
            } else if (type === 'trash') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(0.2, now);
            } else {
                osc.frequency.setValueAtTime(523.25, now);
                gain.gain.setValueAtTime(0.1, now);
            }
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        }

        function playHeartbeat() {
            const now = audioCtx.currentTime;
            [0, 0.25].forEach(delay => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(60 - (delay * 40), now + delay);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + delay + 0.1);
                g.gain.setValueAtTime(0.2, now + delay);
                g.gain.linearRampToValueAtTime(0, now + delay + 0.15);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(now + delay); osc.stop(now + delay + 0.15);
            });
        }

        function triggerScreenShake() {
            document.body.classList.add('screen-shake');
            triggerVibration(40); // Light haptic feedback
            setTimeout(() => {
                document.body.classList.remove('screen-shake');
            }, 150);
        }

        function triggerGameOverExplosion(x, y) {
            gameActive = false;
            voidX = x; voidY = y;
            blackHoleActive = true;
            canvas.classList.add('game-explode');
            triggerVibration([100, 50, 200]); // "Thump" vibration pattern
            playPopSound('trash');
            setTimeout(() => {
                canvas.classList.remove('game-explode');
                endGame();
            }, 1100);
        }

        class TableFan {
            constructor() {
                this.x = cw + 100;
                this.targetX = cw - 60;
                this.y = ch * 0.5;
                this.rotation = 0;
                this.active = false;
            }
            update() {
                let ts = timeFreezeTimer > 0 ? 0.3 : 1;
                if (currentLevel >= 5 && fanEnabled) {
                    this.active = true;
                    if (this.x > this.targetX) this.x -= 2 * ts;
                    this.rotation += (0.1 + (currentLevel * 0.05)) * ts;
                    if (Math.random() < 0.15) {
                        windTrails.push({
                            x: this.x - 40,
                            y: this.y + (Math.random() - 0.5) * 120,
                            len: 40 + Math.random() * 100,
                            alpha: 0.4
                        });
                    }
                } else {
                    if (this.x < cw + 100) {
                        this.x += 2 * ts;
                        this.rotation += 0.05 * ts;
                    } else {
                        this.active = false;
                    }
                }
            }
            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#444';
                ctx.fillRect(-10, 40, 20, 60);
                ctx.fillRect(-30, 90, 60, 10);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 60, 0, Math.PI * 2);
                ctx.stroke();
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#666';
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.ellipse(0, 25, 12, 35, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.rotate((Math.PI * 2) / 3);
                }
                ctx.restore();
            }
        }

        const fan = new TableFan();

        class Lizard {
            constructor() {
                this.x = -100; this.y = 300;
                this.targetY = 300;
                this.state = 'idle';
                this.tongueLen = 0;
                this.targetBubble = null;
                this.bodyColor = '#4a7c44';
            }
             update() {
                let ts = timeFreezeTimer > 0 ? 0.3 : 1;
                if (currentLevel < 2 || !lizardEnabled) {
                    if (this.x > -100) this.x -= 2 * ts;
                    return;
                }
                this.x = Math.min(this.x + 2 * ts, 20);
                if (this.state === 'idle') {
                    this.y += (this.targetY - this.y) * 0.02 * ts;
                    if (Math.abs(this.y - this.targetY) < 10) this.targetY = Math.random() * (ch - 200) + 100;
                    if (Math.random() < 0.015) {
                        const targets = bubbles.filter(b =>  b.rarity !== 'trash');
                        if (targets.length > 0) {
                            this.targetBubble = targets[Math.floor(Math.random() * targets.length)];
                            this.state = 'attacking';
                        }
                    }
                }
                if (this.state === 'attacking') {
                    let dx = this.targetBubble.x - this.x;
                    let dy = this.targetBubble.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    this.tongueLen += 12 * ts;
                    if (this.tongueLen >= dist) {
                        this.targetBubble.reset();
                        playPopSound('trash');
                        triggerScreenShake();
                        this.state = 'returning';
                    }
                }
                if (this.state === 'returning') {
                    this.tongueLen -= 15 * ts;
                    if (this.tongueLen <= 0) {
                        this.tongueLen = 0;
                        this.state = 'idle';
                    }
                }
            }
            draw() {
                if (currentLevel < 2 || (this.x <= -100 && !lizardEnabled)) return;
                if (this.tongueLen > 0 && this.targetBubble) {
                    ctx.strokeStyle = '#ff7b7b';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(this.x + 30, this.y);
                    let angle = Math.atan2(this.targetBubble.y - this.y, this.targetBubble.x - this.x);
                    ctx.lineTo(this.x + 30 + Math.cos(angle) * this.tongueLen, this.y + Math.sin(angle) * this.tongueLen);
                    ctx.stroke();
                }
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(Date.now() * 0.005) * 0.1);
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.ellipse(0, 0, 40, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(35, -5, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(40, -8, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const hunter = new Lizard();

        class Bubble {
            constructor(x, y, isMini = false) {
                this.isMini = isMini;
                this.toRemove = false;
                this.isStatic = false;
                if (isMini) {
                    this.x = x;
                    this.y = y;
                    this.radius = 12;
                    this.speed = (Math.random() * 0.5 + 1.2) * speedMultiplier;
                    this.vx = (Math.random() - 0.5) * 4;
                    this.color = '#ff5722';
                    this.rarity = 'mini';
                    this.points = 2;
                    this.wobbleAngle = Math.random() * Math.PI * 2;
                    this.popCooldown = 15; // Frames before mini bubble can be popped
                } else {
                    this.popCooldown = 0;
                    this.reset();
                    this.y = Math.random() * ch;
                }
            }
            reset() {
                this.radius = Math.random() * 20 + 22;
                this.x = Math.random() * (cw - 150) + 50;
                this.y = ch + this.radius + Math.random() * 100;
                this.speed = (Math.random() * 0.8 + 0.5) * speedMultiplier;
                this.popCooldown = 0;
                this.vx = 0;
                this.wobbleAngle = Math.random() * Math.PI * 2;
                this.orbitAngle = Math.random() * Math.PI * 2;

                // Only allow one specialty bubble (not normal, trash, or mini) on screen at a time
                const specialtyActive = bubbles.some(b => b !== this && !['normal', 'trash', 'mini'].includes(b.rarity));
                const rand = Math.random();

                if (!zenModeEnabled && currentLevel >= 4 && rand < 0.04) { // 4% chance for Void hazard at Lvl 4+
                    this.rarity = 'void'; this.color = '#ff1111'; this.points = 0; this.radius = 40; this.orbiters = 4;
                } else if (!zenModeEnabled && rand < 0.15) { // 15% chance for Trash hazard
                    this.rarity = 'trash'; this.color = '#3e2723'; this.points = -100; this.radius = 35;
                } else if (!specialtyActive && rand < 0.28) { // specialty chance
                    // Level-based unlocks for Specialty Bubbles
                    if (currentLevel >= 7 && Math.random() < 0.1) { this.rarity = 'diamond'; this.color = '#ffffff'; this.points = 50; this.orbiters = 2; }
                    else if (currentLevel >= 6 && Math.random() < 0.15) { this.rarity = 'surge'; this.color = '#9d00ff'; this.points = 15; this.orbiters = 2; }
                    else if (currentLevel >= 4 && Math.random() < 0.2) { this.rarity = 'magnet'; this.color = '#ff00ff'; this.points = 10; this.orbiters = 1; }
                    else if (currentLevel >= 3 && Math.random() < 0.25) { this.rarity = 'freeze'; this.color = '#00ffff'; this.points = 10; this.orbiters = 1; }
                    else if (currentLevel >= 2 && Math.random() < 0.3) { this.rarity = 'split'; this.color = '#ff5722'; this.points = 15; this.radius = 45; }
                    else { this.rarity = 'gold'; this.color = '#FFD700'; this.points = 25; this.orbiters = 3; }
                } else {
                    // Default to Normal Bubble
                    this.rarity = 'normal';
                    this.color = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
                    this.points = 5;
                }
            }
            update() {
                let ts = timeFreezeTimer > 0 ? 0.3 : 1;
                if (this.isStatic) ts = 1; // Keep store animations smooth
                if (this.popCooldown > 0) this.popCooldown--;

                if (!this.isStatic) {
                    this.y -= this.speed * ts;
                    if (this.isMini) this.x += this.vx * ts;

                    // Magnet Logic: Attracts all bubbles EXCEPT trash bubbles
                    if (magnetTimer > 0 && lastX !== 0 && this.rarity !== 'trash') {
                        let dx = lastX - this.x;
                        let dy = lastY - this.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 1 && dist < 500) {
                            this.x += (dx / dist) * 5 * ts;
                            this.y += (dy / dist) * 5 * ts;
                        }
                    }
                    if (currentLevel >= 5 && fanEnabled && fan.active) {
                        let windStrength = (currentLevel - 1) * 0.04 * ts;
                        if (this.y <= fan.y) {
                            this.vx -= windStrength;
                            this.x += this.vx;
                        }
                    }
                    if (this.rarity === 'void' && Math.random() < 0.3 * ts) {
                        let p = new Particle(this.x + (Math.random() - 0.5) * 20, this.y + (Math.random() - 0.5) * 20, 'rgba(15, 0, 0, 0.4)');
                        p.size = Math.random() * 12 + 6;
                        p.vx = (Math.random() - 0.5) * 0.6;
                        p.vy = (Math.random() - 0.5) * 0.6;
                        particles.push(p);
                    }
                    this.x += Math.sin(this.y / 60) * 0.5 * ts;
                }

                this.wobbleAngle += 0.02 * ts;
                this.orbitAngle += 0.05 * ts;
                if (!this.isStatic && (this.y < -this.radius || this.x < -this.radius || this.x > cw + this.radius)) {
                    if (this.isMini) this.toRemove = true;
                    else this.reset();
                }
            }
             draw(targetCtx = ctx) {
                targetCtx.save();
                let r = this.radius;
                if (this.rarity !== 'normal' && this.rarity !== 'trash') {
                    if (this.rarity === 'void') {
                        const pulse = Math.sin(this.wobbleAngle * 5);
                        r += pulse * 12;
                        targetCtx.shadowBlur = 25 + pulse * 15;
                        const cycle = (Math.sin(this.wobbleAngle * 2) + 1) / 2;
                        const red = Math.floor(cycle * 180);
                        this.color = `rgb(${red}, 0, 0)`;
                    } else {
                        r += Math.sin(this.wobbleAngle) * 2;
                        targetCtx.shadowBlur = 15;
                    }
                    targetCtx.shadowColor = this.color;
                    for (let i = 0; i < this.orbiters; i++) {
                        let a = this.orbitAngle + (i * (Math.PI * 2 / this.orbiters));
                        let ox = this.x + Math.cos(a) * (this.radius + 18);
                        let oy = this.y + Math.sin(a) * (this.radius + 18);
                        targetCtx.fillStyle = "white"; targetCtx.beginPath(); targetCtx.arc(ox, oy, 3, 0, Math.PI*2); targetCtx.fill();
                    }
                }
                targetCtx.beginPath(); targetCtx.arc(this.x, this.y, r, 0, Math.PI * 2);
                let grad = targetCtx.createRadialGradient(this.x - r/3, this.y - r/3, 0, this.x, this.y, r);
                if (this.rarity === 'trash') {
                    grad.addColorStop(0, '#8d6e63');
                    grad.addColorStop(1, '#3e2723');
                    targetCtx.fillStyle = grad;
                    targetCtx.fill();
                    targetCtx.fillStyle = 'rgba(0,0,0,0.4)';
                    targetCtx.fillRect(this.x - 5, this.y - 5, 4, 4);
                    targetCtx.fillRect(this.x + 6, this.y + 2, 3, 3);
                } else if (this.rarity === 'void') {
                    grad.addColorStop(0, '#220000');
                    grad.addColorStop(1, this.color);
                    targetCtx.fillStyle = grad; targetCtx.fill();
                } else {
                    grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, this.color + 'aa');
                    targetCtx.fillStyle = grad; targetCtx.fill();
                }
                 targetCtx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, isTrail = false) {
                this.x = x; this.y = y; this.color = color;
                this.isTrail = isTrail;
                this.size = isTrail ? 1.5 : Math.random() * 4 + 1;
                this.vx = (Math.random() - 0.5) * (isTrail ? 2 : 10);
                this.vy = (Math.random() - 0.5) * (isTrail ? 2 : 10);
                this.life = 1.0;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= (this.isTrail ? 0.05 : 0.03); }
            draw() {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                if (this.isTrail) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(Math.PI / 4);
                    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                } else {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        class ScoreText {
            constructor(x, y, text, color, size = 28) { this.x = x; this.y = y; this.text = text; this.color = color; this.size = size; this.life = 1.0; }
            update() { this.y -= 1; this.life -= 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                ctx.font = "bold " + this.size + "px Segoe UI"; ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y); ctx.restore();
            }
        }

        function handlePop(e) {
            if (!gameActive) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x === undefined || y === undefined) return;
            lastX = x; lastY = y;
            particles.push(new Particle(x, y, '#e0ffff', true));
            bubbles.forEach((b) => {
                if (Math.hypot(x - b.x, y - b.y) < b.radius + 15) {
                    if (b.popCooldown > 0) return; // Skip if still in cooldown phase

                    if (b.rarity === 'void') {
                        triggerGameOverExplosion(b.x, b.y);
                        return;
                    }

                    if (b.rarity === 'trash') playPopSound('trash');
                    else if (b.rarity === 'normal') playPopSound('normal');
                    else playPopSound('special');

                    const now = Date.now();
                    if (now - lastPopTime < 600) comboCount++;
                    else comboCount = 1;
                    lastPopTime = now;

                    if (b.rarity === 'freeze') timeFreezeTimer = 300;
                    if (b.rarity === 'magnet') magnetTimer = 300;
                    if (b.rarity === 'surge') surgeTimer = 300;

                    if (b.rarity === 'split') {
                        for(let i=0; i<4; i++) {
                            // Spawn with slight offset so they don't look like a single bubble
                            bubbles.push(new Bubble(b.x + (Math.random()-0.5)*10, b.y + (Math.random()-0.5)*10, true));
                        }
                    }

                    if (comboCount > 1) {
                        scoreTexts.push(new ScoreText(x, y - 70, comboCount + "x COMBO", "#FFD700", 38));
                    }

                    if (b.rarity === 'normal') { streakMultiplier = 1; multDisplay.classList.remove('active-streak'); }
                    else if (b.rarity === 'trash') { streakMultiplier = 1; zenMeter -= 25; multDisplay.classList.remove('active-streak'); triggerScreenShake(); triggerVibration(80); }
                    else { streakMultiplier *= 2; multDisplay.classList.add('active-streak'); }

                    let effectiveMult = surgeTimer > 0 ? 10 : streakMultiplier;
                    multDisplay.innerText = effectiveMult + "x";
                    let pts = b.rarity === 'trash' ? b.points : (b.points * effectiveMult * comboCount);
                    totalScore = Math.max(0, totalScore + pts);
                    popDisplay.innerText = totalScore.toLocaleString();
                    scoreTexts.push(new ScoreText(b.x, b.y - 30, (pts >= 0 ? "+" : "") + pts, b.color));

                    if (b.rarity !== 'trash') {
                        zenMeter = Math.min(100, zenMeter + (b.rarity === 'diamond' ? 40 : 12));
                        document.body.classList.remove('flash-hit');
                        void document.body.offsetWidth;
                        document.body.classList.add('flash-hit');
                    }
                    for (let i = 0; i < 15; i++) particles.push(new Particle(b.x, b.y, b.color));

                    let targetLevel = Math.floor(totalScore / 1000) + 1;
                    if (targetLevel > currentLevel) {
                        currentLevel = targetLevel; speedMultiplier += 0.2; drainRate += 0.02;
                        levelDisplay.innerText = currentLevel;
                        const msg = document.getElementById('level-up-msg');
                        msg.style.opacity = '1'; setTimeout(() => msg.style.opacity = '0', 1200);
                    }
                    if (b.isMini) b.toRemove = true;
                    else b.reset();
                }
            });
        }

        function animate() {
            if (!gameActive && !blackHoleActive) return;
            ctx.clearRect(0, 0, cw, ch);
            let filters = [];
            if (timeFreezeTimer > 0) {
                timeFreezeTimer--;
                filters.push("hue-rotate(180deg) brightness(1.2) saturate(1.5)");
            } else if (!zenModeEnabled) {
                zenMeter -= drainRate;
            }
            if (magnetTimer > 0) {
                magnetTimer--;
                filters.push("drop-shadow(0 0 10px #ff00ff)");
            }
            if (surgeTimer > 0) {
                surgeTimer--;
                filters.push("drop-shadow(0 0 10px #bf00ff)");
            }
            timerFill.style.filter = filters.join(" ");
            timerFill.style.width = Math.max(0, zenMeter) + '%';

            if (zenMeter < 40) {
                timerFill.classList.add('critical');
                timerFill.classList.remove('warning');
                meterVessel.classList.add('vibrate');
                if (audioCtx.currentTime - lastHeartbeat > 0.8) {
                    playHeartbeat();
                    lastHeartbeat = audioCtx.currentTime;
                }
            } else if (zenMeter < 50) {
                timerFill.classList.add('warning');
                timerFill.classList.remove('critical');
                meterVessel.classList.remove('vibrate');
            } else {
                timerFill.classList.remove('warning', 'critical');
                meterVessel.classList.remove('vibrate');
            }

            if (zenMeter <= 0) { endGame(); return; }

            if (blackHoleActive) {
                // Pull bubbles in
                bubbles.forEach(b => {
                    let dx = voidX - b.x, dy = voidY - b.y, dist = Math.hypot(dx, dy);
                    if (dist > 5) {
                        b.x += (dx / dist) * 15; b.y += (dy / dist) * 15;
                        b.radius *= 0.92;
                    } else { b.toRemove = true; }
                });

                // --- Gravitational Lens Warp ---
                const warpRadius = 180 + Math.sin(Date.now() * 0.005) * 20;
                ctx.save();
                // Create clipping circle for the lens
                ctx.beginPath(); ctx.arc(voidX, voidY, warpRadius, 0, Math.PI * 2); ctx.clip();

                // Magnification effect (draw canvas onto itself scaled up)
                ctx.drawImage(canvas, voidX - warpRadius, voidY - warpRadius, warpRadius * 2, warpRadius * 2,
                              voidX - warpRadius * 1.05, voidY - warpRadius * 1.05, warpRadius * 2.1, warpRadius * 2.1);

                // Faint Chromatic Aberration / Ghosting
                ctx.globalAlpha = 0.3; ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(canvas, voidX - warpRadius, voidY - warpRadius, warpRadius * 2, warpRadius * 2,
                              voidX - warpRadius * 1.08, voidY - warpRadius * 1.08, warpRadius * 2.16, warpRadius * 2.16);
                ctx.restore();

                // Black Hole Core
                ctx.beginPath(); ctx.arc(voidX, voidY, 20 + Math.sin(Date.now() * 0.02) * 10, 0, Math.PI * 2);
                ctx.fillStyle = 'black'; ctx.fill(); ctx.strokeStyle = '#ff1111'; ctx.lineWidth = 2; ctx.stroke();
            }

            for(let i = windTrails.length - 1; i >= 0; i--) {
                let w = windTrails[i];
                w.x -= 8 + (currentLevel * 2);
                w.alpha -= 0.01;
                if (w.alpha <= 0 || w.x < -100) { windTrails.splice(i, 1); continue; }
                ctx.strokeStyle = `rgba(255,255,255,${w.alpha})`;
                ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(w.x + w.len, w.y); ctx.stroke();
            }

            fan.update();
            fan.draw();
            hunter.update();
            hunter.draw();
            bubbles.forEach(b => { b.update(); b.draw(ctx); });
            bubbles = bubbles.filter(b => !b.toRemove);
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());
            scoreTexts.forEach(st => st.update());
            scoreTexts = scoreTexts.filter(st => st.life > 0);
            scoreTexts.forEach(st => st.draw());
            requestAnimationFrame(animate);
        }

         function endGame() {
            gameActive = false;
            blackHoleActive = false;
            document.getElementById('final-score').innerText = totalScore.toLocaleString();
            const recordMsg = document.getElementById('new-record-msg');
            if (totalScore > bestScore) {
                bestScore = totalScore;
                localStorage.setItem('zenBathBestScore', bestScore);
                bestDisplay.innerText = totalScore.toLocaleString();
                recordMsg.style.display = 'block';
            } else recordMsg.style.display = 'none';
            gameOverScreen.style.display = 'flex';
        }

        function startGame() {
            audioCtx.resume();
            overlay.style.display = 'none';
            canvas.classList.remove('game-explode');
            gameActive = true;
            bubbles = Array.from({length: 18}, () => new Bubble());
            animate();
        }

        function resetGame() {
            totalScore = 0; currentLevel = 1; speedMultiplier = 1; streakMultiplier = 1; zenMeter = 100; comboCount = 0; lastPopTime = 0; drainRate = 0.06; timeFreezeTimer = 0; magnetTimer = 0; surgeTimer = 0; lastX = 0; lastY = 0; blackHoleActive = false;
            gameActive = true; popDisplay.innerText = "0"; levelDisplay.innerText = "1"; multDisplay.innerText = "1x";
            gameOverScreen.style.display = 'none';
            timerFill.classList.remove('warning', 'critical');
            meterVessel.classList.remove('vibrate');
            canvas.classList.remove('game-explode');
            fan.x = cw + 100; fan.active = false;
            hunter.x = -100;
            bubbles.forEach(b => b.reset());
            animate();
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isMouseDown = true;
            handlePop(e);
        });
        window.addEventListener('mousemove', (e) => {
            if (isMouseDown) handlePop(e);
        });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            handlePop(e);
        }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            handlePop(e);
        }, { passive: true });
        window.addEventListener('resize', updateCanvasSize);
    </script>
