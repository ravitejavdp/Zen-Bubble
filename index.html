<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>ZenBath Pro - Fan Edition</title>
    <style>
        /* 1. RESPONSIVE RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Magic fix for mobile browser bars */
        }

        /* 2. OVERLAYS (Responsive & Centered) */
        #overlay, #game-over {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 2000;
            padding: 20px;
            text-align: center;
            color: white;
        }

        #game-over { display: none; }

        button {
            all: unset;
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: #fff;
            color: #b21f1f;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.25rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            touch-action: auto; /* Allow tapping */
        }

        button:active { transform: scale(0.95); }

        /* 3. UI ELEMENTS */
        #meter-vessel {
            width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1);
            position: absolute; top: 0; left: 0; z-index: 100;
        }
        #timer-bar-fill {
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, #4ecca3, #bbffaa, #4ecca3);
            background-size: 200% auto;
            transition: width 0.2s linear;
        }

        #ui-top { 
            position: absolute; top: 20px; left: 0; right: 0; 
            display: flex; justify-content: center; pointer-events: none; z-index: 50;
        }
        .stats-row { 
            width: 90%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; 
        }

        .mini-stat {
            color: #ffffff; font-weight: bold; font-size: 14px; 
            background: rgba(0, 0, 0, 0.5); padding: 8px 15px; 
            border-radius: 12px; backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
        }
        .stat-label { font-size: 9px; opacity: 0.6; text-transform: uppercase; margin-bottom: 2px; }

        #multiplier-display {
            font-size: 38px; font-weight: 900; color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #level-tag {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.5); color: white;
            padding: 5px 12px; border-radius: 10px; font-size: 12px;
            font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
        }

        #level-up-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 40px; font-weight: 900; opacity: 0;
            pointer-events: none; transition: opacity 0.4s;
            text-shadow: 0 0 30px #fdbb2d; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 5px; margin-bottom: 10px;">ZENBATH PRO</h1>
        <p style="opacity: 0.8;">Vibe with the bubbles.<br>Fan at LVL 2 • Hunter at LVL 5</p>
        <button onpointerdown="startGame()">START VIBING</button>
    </div>

    <div id="meter-vessel"><div id="timer-bar-fill"></div></div>

    <div id="ui-top">
        <div class="stats-row">
            <div class="mini-stat">
                <span class="stat-label">Best</span>
                <span id="best-val">0</span>
            </div>
            <div id="multiplier-display">1x</div>
            <div class="mini-stat">
                <span class="stat-label">Score</span>
                <span id="pop-count">0</span>
            </div>
        </div>
    </div>

    <div id="level-tag">LEVEL <span id="level-val">1</span></div>
    <div id="level-up-msg">LEVEL UP!</div>

    <div id="game-over">
        <h1 style="letter-spacing: 5px;">GAME OVER</h1>
        <p>Final Score: <span id="final-score" style="font-size: 28px; color: #fdbb2d;">0</span></p>
        <p id="new-record-msg" style="color: #4ecca3; display: none; margin-top: 10px; font-weight: bold;">NEW RECORD!</p>
        <button onpointerdown="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const popDisplay = document.getElementById('pop-count');
        const bestDisplay = document.getElementById('best-val');
        const levelDisplay = document.getElementById('level-val');
        const multDisplay = document.getElementById('multiplier-display');
        const timerFill = document.getElementById('timer-bar-fill');
        const gameOverScreen = document.getElementById('game-over');
        const overlay = document.getElementById('overlay');

        let bubbles = [], particles = [], scoreTexts = [], windTrails = [];
        let totalScore = 0, currentLevel = 1, speedMultiplier = 1;
        let streakMultiplier = 1, zenMeter = 100, gameActive = false, drainRate = 0.12;
        
        let bestScore = localStorage.getItem('zenBathBestScore') || 0;
        bestDisplay.innerText = Number(bestScore).toLocaleString();

        const bubbleColors = ['#a1c4fd', '#c2e9fb', '#d4fc79', '#96e6a1', '#84fab0', '#e0c3fc'];

        // --- RESPONSIVE RESIZE ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (fan) fan.resetPosition();
            if (hunter) hunter.resetPosition();
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', resize);
        resize();

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPopSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'special') {
                    osc.frequency.setValueAtTime(783.99, now);
                    osc.frequency.exponentialRampToValueAtTime(1174.66, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                } else if (type === 'trash') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(100, now);
                    gain.gain.setValueAtTime(0.2, now);
                } else {
                    osc.frequency.setValueAtTime(523.25, now);
                    gain.gain.setValueAtTime(0.1, now);
                }
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } catch(e) {}
        }

        // --- GAME OBJECTS ---
        class TableFan {
            constructor() {
                this.active = false;
                this.rotation = 0;
                this.resetPosition();
            }
            resetPosition() {
                this.targetX = canvas.width - 70;
                this.y = canvas.height * 0.5;
                this.x = this.active ? this.targetX : canvas.width + 120;
            }
            update() {
                if (currentLevel >= 2) {
                    this.active = true;
                    if (this.x > this.targetX) this.x -= 3;
                    else this.x = canvas.width - 70; // Lock to responsive edge
                    this.y = canvas.height * 0.5;
                    this.rotation += 0.1 + (currentLevel * 0.05);

                    if (Math.random() < 0.15) {
                        windTrails.push({
                            x: this.x - 40,
                            y: this.y + (Math.random() - 0.5) * 120,
                            len: 40 + Math.random() * 100,
                            alpha: 0.4
                        });
                    }
                }
            }
            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#444';
                ctx.fillRect(-10, 40, 20, 60);
                ctx.fillRect(-30, 90, 60, 10);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.stroke();
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#666';
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.ellipse(0, 25, 12, 35, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.rotate((Math.PI * 2) / 3);
                }
                ctx.restore();
            }
        }

        class Lizard {
            constructor() {
                this.active = false;
                this.resetPosition();
                this.state = 'idle';
                this.tongueLen = 0;
                this.targetBubble = null;
            }
            resetPosition() {
                this.targetY = canvas.height * 0.4;
                this.y = this.targetY;
                this.x = this.active ? 20 : -100;
            }
            update() {
                if (currentLevel >= 5) {
                    this.active = true;
                    this.x = Math.min(this.x + 2, 20);
                    if (this.state === 'idle') {
                        this.y += (this.targetY - this.y) * 0.02;
                        if (Math.abs(this.y - this.targetY) < 10) this.targetY = Math.random() * (canvas.height - 200) + 100;
                        if (Math.random() < 0.015) {
                            const targets = bubbles.filter(b => b.rarity !== 'trash');
                            if (targets.length > 0) {
                                this.targetBubble = targets[Math.floor(Math.random() * targets.length)];
                                this.state = 'attacking';
                            }
                        }
                    } else if (this.state === 'attacking') {
                        let dx = this.targetBubble.x - this.x, dy = this.targetBubble.y - this.y;
                        let dist = Math.hypot(dx, dy);
                        this.tongueLen += 15;
                        if (this.tongueLen >= dist) {
                            this.targetBubble.reset();
                            playPopSound('trash');
                            this.state = 'returning';
                        }
                    } else if (this.state === 'returning') {
                        this.tongueLen -= 20;
                        if (this.tongueLen <= 0) { this.tongueLen = 0; this.state = 'idle'; }
                    }
                }
            }
            draw() {
                if (!this.active) return;
                if (this.tongueLen > 0 && this.targetBubble) {
                    ctx.strokeStyle = '#ff7b7b'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(this.x + 30, this.y);
                    let angle = Math.atan2(this.targetBubble.y - this.y, this.targetBubble.x - this.x);
                    ctx.lineTo(this.x + 30 + Math.cos(angle) * this.tongueLen, this.y + Math.sin(angle) * this.tongueLen);
                    ctx.stroke();
                }
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(Date.now() * 0.005) * 0.1);
                ctx.fillStyle = '#4a7c44';
                ctx.beginPath(); ctx.ellipse(0, 0, 40, 18, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(35, -5, 12, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        const fan = new TableFan();
        const hunter = new Lizard();

        class Bubble {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.radius = Math.random() * 20 + 22;
                this.x = Math.random() * (canvas.width - 150) + 75;
                this.y = canvas.height + this.radius + Math.random() * 100;
                this.speed = (Math.random() * 0.8 + 0.5) * speedMultiplier;
                this.vx = 0;
                this.wobble = Math.random() * Math.PI * 2;
                const rand = Math.random();
                if (rand < 0.03) { this.rarity = 'diamond'; this.color = '#ffffff'; this.points = 50; }
                else if (rand < 0.10) { this.rarity = 'gold'; this.color = '#FFD700'; this.points = 25; }
                else if (rand < 0.25) { this.rarity = 'trash'; this.color = '#3e2723'; this.points = -100; this.radius = 35; }
                else { this.rarity = 'normal'; this.color = bubbleColors[Math.floor(Math.random() * bubbleColors.length)]; this.points = 5; }
            }
            update() {
                this.y -= this.speed;
                if (currentLevel >= 2) {
                    this.vx -= (currentLevel - 1) * 0.05;
                    this.x += this.vx;
                }
                this.x += Math.sin(this.y / 60) * 0.5;
                if (this.y < -this.radius || this.x < -this.radius) this.reset();
            }
            draw() {
                ctx.save();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(this.x - this.radius/3, this.y - this.radius/3, 0, this.x, this.y, this.radius);
                if (this.rarity === 'trash') {
                    grad.addColorStop(0, '#8d6e63'); grad.addColorStop(1, '#3e2723');
                } else {
                    grad.addColorStop(0, '#fff'); grad.addColorStop(1, this.color + 'aa');
                }
                ctx.fillStyle = grad; ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
            draw() {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // --- CORE LOGIC ---
        function handlePop(e) {
            if (!gameActive) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            bubbles.forEach((b) => {
                if (Math.hypot(x - b.x, y - b.y) < b.radius + 20) {
                    playPopSound(b.rarity);
                    if (b.rarity === 'normal') streakMultiplier = 1;
                    else if (b.rarity === 'trash') { streakMultiplier = 1; zenMeter -= 20; }
                    else { streakMultiplier *= 2; }
                    
                    multDisplay.innerText = streakMultiplier + "x";
                    let pts = b.rarity === 'trash' ? b.points : (b.points * streakMultiplier);
                    totalScore = Math.max(0, totalScore + pts);
                    popDisplay.innerText = totalScore.toLocaleString();
                    zenMeter = Math.min(100, zenMeter + (b.rarity === 'diamond' ? 30 : 10));
                    
                    for (let i = 0; i < 10; i++) particles.push(new Particle(b.x, b.y, b.color));
                    
                    let targetLevel = Math.floor(totalScore / 1000) + 1;
                    if (targetLevel > currentLevel) {
                        currentLevel = targetLevel; speedMultiplier += 0.15;
                        levelDisplay.innerText = currentLevel;
                        const msg = document.getElementById('level-up-msg');
                        msg.style.opacity = '1'; setTimeout(() => msg.style.opacity = '0', 1000);
                    }
                    b.reset();
                }
            });
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            zenMeter -= drainRate;
            timerFill.style.width = Math.max(0, zenMeter) + '%';
            if (zenMeter <= 0) { endGame(); return; }

            for(let i = windTrails.length - 1; i >= 0; i--) {
                let w = windTrails[i]; w.x -= 10; w.alpha -= 0.02;
                if (w.alpha <= 0) { windTrails.splice(i, 1); continue; }
                ctx.strokeStyle = `rgba(255,255,255,${w.alpha})`;
                ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(w.x + w.len, w.y); ctx.stroke();
            }

            fan.update(); fan.draw();
            hunter.update(); hunter.draw();
            bubbles.forEach(b => { b.update(); b.draw(); });
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            
            requestAnimationFrame(animate);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            overlay.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameActive = true;
            bubbles = Array.from({length: 15}, () => new Bubble());
            animate();
        }

        function endGame() {
            gameActive = false;
            document.getElementById('final-score').innerText = totalScore.toLocaleString();
            if (totalScore > bestScore) {
                bestScore = totalScore; localStorage.setItem('zenBathBestScore', bestScore);
                bestDisplay.innerText = bestScore.toLocaleString();
                document.getElementById('new-record-msg').style.display = 'block';
            }
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            totalScore = 0; currentLevel = 1; speedMultiplier = 1; streakMultiplier = 1; zenMeter = 100;
            popDisplay.innerText = "0"; levelDisplay.innerText = "1"; multDisplay.innerText = "1x";
            fan.active = false; fan.resetPosition();
            hunter.active = false; hunter.resetPosition();
            startGame();
        }

        // Global Listeners for Bubbles
        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            handlePop(e);
        });
    </script>
</body>
</html>
